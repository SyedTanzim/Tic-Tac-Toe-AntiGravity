<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <title>Tic Tac Toe</title>
</head>

<body>
    <!-- Start Modal -->
    <div id="startModal" class="modal">
        <div class="modal-content">
            <h2>Welcome to Tic Tac Toe</h2>
            <div class="mode-selector">
                <label>
                    <input type="radio" name="gameMode" value="pvp" checked> 2 Player
                </label>
                <label>
                    <input type="radio" name="gameMode" value="pvc"> vs Computer
                </label>
            </div>
            <div class="player-inputs">
                <input type="text" id="p1Name" placeholder="Player 1, enter your name">
                <input type="text" id="p2Name" placeholder="Player 2, enter your name">
            </div>
            <div class="difficulty-selector hidden" id="difficultySelector">
                <label for="aiDifficulty">AI Difficulty:</label>
                <select id="aiDifficulty">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <button id="startGameBtn">Start Game</button>
        </div>
    </div>

    <!-- Winner Banner -->
    <div id="winnerBanner" class="banner hidden">
        <h2 id="winnerText"></h2>
        <button id="bannerRestartBtn" class="restartBtn">Play Again</button>
    </div>

    <div class="game-wrapper">
        <div class="mainContainer">
            <div class="scoreboard">
                <span id="scoreP1" class="score-pill">Player 1: 0</span>
                <span id="scoreDraws" class="score-pill">Draws: 0</span>
                <span id="scoreP2" class="score-pill">Player 2: 0</span>
            </div>
            <div class="container"></div>
            <button class="restartBtn" id="mainRestartBtn">Restart</button>
        </div>

    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
